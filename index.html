<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ldnmap</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0a0a'/%3E%3Cpath d='M16 8a6 6 0 0 0-6 6c0 4.5 6 10 6 10s6-5.5 6-10a6 6 0 0 0-6-6zm0 8.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z' fill='%232ecc71'/%3E%3C/svg%3E">
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://api.mapbox.com">
</head>
<body class="light">
<div id="map"></div>
<button id="search-pill" onclick="openSearchOverlay()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.5-4.5"/>
  </svg>
  <span class="pill-label">Search Maps</span>
</button>
<button class="theme-fab" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
  <svg id="theme-icon-fab" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
</button>
<div id="search-overlay" class="search-overlay">
  <div class="search-overlay-header">
    <button class="search-overlay-back" id="search-back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>
    <input class="sinput" id="overlay-input" autocomplete="off" placeholder="">
  </div>
  <div class="search-overlay-list" id="overlay-sugg"></div>
</div>

<div id="travel-card" class="travel-card">
  <div class="travel-card-header">
    <button class="travel-card-btn" onclick="changeMode()" aria-label="Change mode">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>
    <div class="travel-card-title" id="st">Loading…</div>
    <button class="travel-card-btn share-btn" id="share-btn" onclick="shareLink()" aria-label="Share link" title="Copy share link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/>
      </svg>
    </button>
    <button class="travel-card-btn" onclick="closeTravelCard()" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>
  <div class="travel-modes">
    <button class="travel-mode-btn active" id="btn-walking" onclick="pickMode('walking')">Walk</button>
    <button class="travel-mode-btn" id="btn-cycling" onclick="pickMode('cycling')">Cycle</button>
    <button class="travel-mode-btn" id="btn-driving" onclick="pickMode('driving')">Drive</button>
  </div>
  <div class="travel-slots">
    <div class="travel-slot" id="slot-5"  onclick="selectBucket(5)"  style="--slot-color:#2ecc71"><div class="travel-slot-min">5 min</div></div>
    <div class="travel-slot" id="slot-10" onclick="selectBucket(10)" style="--slot-color:#3498db"><div class="travel-slot-min">10 min</div></div>
    <div class="travel-slot" id="slot-15" onclick="selectBucket(15)" style="--slot-color:#f39c12"><div class="travel-slot-min">15 min</div></div>
    <div class="travel-slot" id="slot-20" onclick="selectBucket(20)" style="--slot-color:#e74c3c"><div class="travel-slot-min">20 min</div></div>
  </div>
  <!-- [stations] nearby stations section -->
  <div class="travel-stations" id="travel-stations"></div>
</div>

<div id="postcode-chip" class="postcode-chip">
  <div class="postcode-chip-header">
    <button class="travel-card-btn" onclick="chipBack()" aria-label="Change mode">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>
    <div class="postcode-chip-info">
      <div class="postcode-chip-title-row">
        <div class="postcode-chip-label" id="pc-label"></div>
        <div class="postcode-chip-badge" id="pc-badge"></div>
        <button class="pc-copy-btn" id="pc-copy-btn" onclick="copyPostcode()" aria-label="Copy postcode" title="Copy postcode">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
      <div class="postcode-chip-status" id="pc-st"></div>
    </div>
    <button class="travel-card-btn" onclick="closePostcodeChip()" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>
  <div class="postcode-cta-row">
    <div class="postcode-cta-btns">
      <button class="travel-mode-btn" id="postcode-cta-btn" disabled onclick="launchFromPostcodeDefault()">Check Travel Time</button>
    </div>
  </div>
  <div class="postcode-chip-attrib">© OS data © Crown copyright 2025</div>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script src="app.js"></script>
</body>
</html>
